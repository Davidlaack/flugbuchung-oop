<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitzplan</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
    h1 { color: #1e3a8a; text-align: center; }
    .info { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .seat-map { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 10px 0; }
    .row-label { font-weight: bold; font-size: 20px; width: 40px; text-align: center; color: #555; }
    .seats { display: flex; gap: 8px; }
    .seat { 
      width: 38px; height: 38px; border-radius: 8px; 
      background: #28a745; color: white; font-weight: bold; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    .seat:hover { transform: scale(1.15); }
    .seat.booked { 
      background: #dc3545 !important; 
      cursor: not-allowed; 
    }
    .seat.booked:hover { transform: none; }
    .aisle { width: 50px; background: #ddd; border-radius: 4px; }

    .level-tabs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .level-tab {
      padding: 12px 24px;
      background: #f1f1f1;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    .level-tab.active {
      background: #1e3a8a;
      color: white;
    }
    .back { 
      display: inline-block; margin-bottom: 15px; padding: 10px 15px; 
      background: #007bff; color: white; border-radius: 8px; text-decoration: none; 
    }
  </style>
</head>
<body>
  <a href="index.html" class="back">← Zurück</a>
  
  <h1 id="title">Sitzplan wird geladen...</h1>
  <div class="info" id="info"></div>

  <!-- Neue Ebenen-Tabs -->
  <div id="levelTabs" class="level-tabs"></div>

  <div class="seat-map" id="map"></div>

  <script>
    let currentFlight = null;
    let currentLevel = 1;   // aktuelle angezeigte Ebene (1 oder 2)

    async function loadMinimalSeatMap() {
      const params = new URLSearchParams(location.search);
      const flightId = params.get('flightId');
      if (!flightId) return;

      const res = await fetch(`/api/flights/${flightId}`);
      const flight = await res.json();
      currentFlight = flight;

      // Titel + Info
      document.getElementById('title').textContent = flight.flugname;
      document.getElementById('info').innerHTML = `
        ${flight.startflughafen} → ${flight.endflughafen}<br>
        ${flight.datum} ${flight.uhrzeit}<br>
        <strong>${flight.maschinen_kuerzel} – ${flight.maschinen_name}</strong>
      `;

      // Gebuchte Sitze laden
      let bookedSeats = [];
      try {
        const bookedRes = await fetch(`/api/flights/${flightId}/bookings`);
        if (bookedRes.ok) bookedSeats = await bookedRes.json();
      } catch (e) {}

      // Tabs für Ebenen anzeigen (nur wenn > 1 Ebene)
      renderLevelTabs(flight.anzahl_ebenen);

      // Erste Ebene rendern
      renderGrid(flight.anzahl_reihen, flight.anzahl_sitze, flightId, bookedSeats, currentLevel);
    }

    function renderLevelTabs(anzahlEbenen) {
      const container = document.getElementById('levelTabs');
      container.innerHTML = '';

      if (anzahlEbenen <= 1) return;   // keine Tabs nötig, wenn es nur eine Ebene gibt

      for (let ebene = 1; ebene <= anzahlEbenen; ebene++) {
        const btn = document.createElement('button');
        btn.className = `level-tab ${ebene === currentLevel ? 'active' : ''}`;
        btn.textContent = `Ebene ${ebene}`;
        btn.onclick = () => {
          currentLevel = ebene;
          renderLevelTabs(anzahlEbenen);   // aktiven Tab aktualisieren
          loadMinimalSeatMap();            // neu rendern
        };
        container.appendChild(btn);
      }
    }

    function renderGrid(reihenProEbene, seatsPerRow, flightId, bookedSeats, level) {
      const map = document.getElementById('map');
      map.innerHTML = '';

      const startReihe = (level - 1) * reihenProEbene + 1;   // z.B. Ebene 2 → ab Reihe 21

      let groups = [seatsPerRow];
      if (seatsPerRow === 6) groups = [3, 3];
      if (seatsPerRow === 9) groups = [3, 3, 3];
      if (seatsPerRow === 10) groups = [3, 4, 3];

      for (let i = 0; i < reihenProEbene; i++) {
        const reihe = startReihe + i;

        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';

        // Linke Reihennummer
        const labelLeft = document.createElement('div');
        labelLeft.className = 'row-label';
        labelLeft.textContent = reihe;
        rowDiv.appendChild(labelLeft);

        const seatsDiv = document.createElement('div');
        seatsDiv.className = 'seats';

        let letter = 65;
        groups.forEach((size, idx) => {
          for (let s = 0; s < size; s++) {
            const buchstabe = String.fromCharCode(letter++);
            const seatDiv = document.createElement('div');
            seatDiv.className = 'seat';
            seatDiv.textContent = buchstabe;

            seatDiv.dataset.reihe = reihe;
            seatDiv.dataset.buchstabe = buchstabe;
            seatDiv.dataset.flightId = flightId;

            const isBooked = bookedSeats.some(bs => 
              parseInt(bs.reihe) === reihe && bs.buchstabe === buchstabe
            );

            if (isBooked) {
              seatDiv.classList.add('booked');
              seatDiv.onclick = () => alert(`Sitz ${reihe}${buchstabe} ist bereits reserviert.`);
            } else {
              seatDiv.onclick = async () => {
                if (confirm(`Sitz ${reihe}${buchstabe} auf Flug ${flightId} reservieren?`)) {
                  const response = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ flightId: parseInt(flightId), reihe, sitz: buchstabe })
                  });

                  if (response.ok) {
                    alert(`Sitz ${reihe}${buchstabe} wurde reserviert`);
                    loadMinimalSeatMap();   // neu laden
                  } else {
                    alert('Buchung fehlgeschlagen');
                  }
                }
              };
            }
            seatsDiv.appendChild(seatDiv);
          }
          if (idx < groups.length - 1) {
            const aisle = document.createElement('div');
            aisle.className = 'aisle';
            seatsDiv.appendChild(aisle);
          }
        });

        rowDiv.appendChild(seatsDiv);

        // Rechte Reihennummer
        const labelRight = document.createElement('div');
        labelRight.className = 'row-label';
        labelRight.textContent = reihe;
        rowDiv.appendChild(labelRight);

        map.appendChild(rowDiv);
      }
    }

    loadMinimalSeatMap();
  </script>
</body>
</html>
