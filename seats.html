<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitzplan</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
    h1 { color: #1e3a8a; text-align: center; }
    .info { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .seat-map { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 10px 0; }
    .row-label { font-weight: bold; font-size: 20px; width: 40px; text-align: center; color: #555; }
    .seats { display: flex; gap: 8px; }
    .seat { 
      width: 38px; height: 38px; border-radius: 8px; 
      background: #28a745; color: white; font-weight: bold; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      cursor: pointer;                 
    }
    .seat:hover { transform: scale(1.15); }
    .seat.booked { 
      background: #dc3545 !important; 
      cursor: not-allowed; 
    }
    .seat.booked:hover { transform: none; }
    .aisle { width: 50px; background: #ddd; border-radius: 4px; }
    .back { 
      display: inline-block; margin-bottom: 15px; padding: 10px 15px; 
      background: #007bff; color: white; border-radius: 8px; text-decoration: none; 
    }
  </style>
</head>
<body>
  <a href="index.html" class="back">← Zurück</a>
  
  <h1 id="title">Sitzplan wird geladen...</h1>
  <div class="info" id="info"></div>
  <div class="seat-map" id="map"></div>

  <script>
    async function loadMinimalSeatMap() {
      const params = new URLSearchParams(location.search);    // location.search = z.b. "?flightId=1"
      const flightId = params.get('flightId');                //Flug-ID aus der URL holen ;
      if (!flightId) return;

      const res = await fetch(`/api/flights/${flightId}`);    // Daten vom Server holen als JSON
      const flight = await res.json();                        // verwandelt diese Antwort in ein normales JavaScript-Objekt 

      // Titel + Info generieren
      document.getElementById('title').textContent = flight.flugname;
      document.getElementById('info').innerHTML = `
        ${flight.startflughafen} → ${flight.endflughafen}<br>
        ${flight.datum} ${flight.uhrzeit}<br>
        <strong>${flight.maschinen_kuerzel} – ${flight.maschinen_name}</strong>
      `;

      // Gebuchte Sitze vom Server laden
      let bookedSeats = [];
      try {
        const bookedRes = await fetch(`/api/flights/${flightId}/bookings`);
        if (bookedRes.ok) {
          bookedSeats = await bookedRes.json();
        }
      } catch (e) {
        console.warn("Gebuchte Sitze konnten nicht geladen werden", e);
      }

      // Grid mit anzahl_reihen + anzahl_sitze
      renderGrid(flight.anzahl_reihen, flight.anzahl_sitze, flightId, bookedSeats);
    }

    function renderGrid(numRows, seatsPerRow, flightId, bookedSeats) {
      const map = document.getElementById('map');
      map.innerHTML = '';

      // Echtes Flugzeug-Layout (nur 3-3, 3-4-3, 3-3-3)
      let groups = [seatsPerRow];
      if (seatsPerRow === 6) groups = [3, 3];
      if (seatsPerRow === 9) groups = [3, 3, 3];
      if (seatsPerRow === 10) groups = [3, 4, 3];

      for (let row = 1; row <= numRows; row++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';

        // Anzeige Reihennummer (links)
        const labelLeft = document.createElement('div');
        labelLeft.className = 'row-label';
        labelLeft.textContent = row;
        rowDiv.appendChild(labelLeft);

        const seatsDiv = document.createElement('div');
        seatsDiv.className = 'seats';

        let letter = 65;                 //Initialisierung auf den ersten Sitz (A) jeder Reihe, was im ASCII-Code für 65 steht
        groups.forEach((size, idx) => {
          for (let i = 0; i < size; i++) {
            const s = document.createElement('div');
            s.className = 'seat';
            const buchstabe = String.fromCharCode(letter++);      // Übersetzung vom Zahlenwert auf den entsprechenden Buchstaben 
            s.textContent = buchstabe;

            // Daten speichern, damit wir später wissen, welcher Sitz das ist
            s.dataset.reihe = row;
            s.dataset.buchstabe = buchstabe;
            s.dataset.flightId = flightId;

            // Prüfen, ob der Sitz bereits gebucht ist
            const isBooked = bookedSeats.some(bs => 
              parseInt(bs.reihe) === parseInt(row) && bs.buchstabe === buchstabe
            );

            if (isBooked) {
              s.classList.add('booked');
              s.onclick = () => {
                alert(`Sitz ${row}${buchstabe} ist bereits reserviert.`);
              };
            } else {
              // Einzelnen Sitz Klickbar machen
              s.onclick = async () => {
                const reihe = s.dataset.reihe;
                const sitz = s.dataset.buchstabe;
                const flug = s.dataset.flightId;

                if (confirm(`Sitz ${reihe}${sitz} auf Flug ${flug} reservieren?`)) {
                  try {
                    const response = await fetch('/api/bookings', {
                      method: 'POST',
                      headers: {
                        'Content-Type': 'application/json',
                      },
                      body: JSON.stringify({
                        flightId: parseInt(flug),
                        reihe: parseInt(reihe),
                        sitz: sitz
                      })
                    });

                    if (response.ok) {
                      console.log(`Reservierung erfolgt: Flug ${flug} | Sitz ${reihe}${sitz}`);
                      alert(`Sitz ${reihe}${sitz} wurde reserviert\n\n`);
                      // Karte neu laden, um den aktualisierten Status (gebucht) anzuzeigen
                      loadMinimalSeatMap();
                    } else {
                      const errorText = await response.text();
                      alert('Buchung fehlgeschlagen: ' + (errorText || 'Unbekannter Fehler'));
                    }
                  } catch (error) {
                    console.error(error);
                    alert('Fehler bei der Verbindung zum Server.');
                  }
                }
              };
            }

            seatsDiv.appendChild(s);
          }
          if (idx < groups.length - 1) {
            const aisle = document.createElement('div');
            aisle.className = 'aisle';
            seatsDiv.appendChild(aisle);
          }
        });

        rowDiv.appendChild(seatsDiv);

        // Anzeige Reihennummer (rechts)
        const labelRight = document.createElement('div');
        labelRight.className = 'row-label';
        labelRight.textContent = row;
        rowDiv.appendChild(labelRight);

        map.appendChild(rowDiv);
      }
    }

    loadMinimalSeatMap();
  </script>
</body>
</html>
